<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>As Quatro Vontades — A Cura Proibida</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; font-family:'Georgia',serif; color:#fff; display:flex; align-items:center; justify-content:center; }
  .screen { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; }
  .screen.active { display:flex; }

  /* INTRO */
  #screen-intro video { width:100%; height:100%; object-fit:cover; }
  #click-to-start { position:absolute; bottom:8%; left:50%; transform:translateX(-50%); font-size:clamp(13px,2vw,19px); color:rgba(168,197,218,.85); letter-spacing:3px; text-transform:uppercase; animation:pulse-text 2s ease-in-out infinite; text-shadow:0 0 20px rgba(168,197,218,.5); pointer-events:none; }
  @keyframes pulse-text { 0%,100%{opacity:.35} 50%{opacity:1} }
  #intro-click-zone { position:absolute; inset:0; cursor:pointer; z-index:10; }

  /* GAME */
  #screen-game { position:relative; flex-direction:column; }
  #game-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #vignette { position:absolute; inset:0; pointer-events:none; z-index:5; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6) 100%); transition:background .3s; }
  #vignette.danger { background:radial-gradient(ellipse at center,transparent 40%,rgba(80,0,0,.75) 100%); }
  #score-display { position:absolute; top:4%; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:4px; z-index:20; }
  #score-number { font-size:clamp(28px,4vw,48px); font-weight:700; color:#fff; text-shadow:0 0 20px rgba(168,197,218,.8); letter-spacing:2px; }
  #combo-display { font-size:clamp(11px,1.5vw,16px); color:#f0c040; letter-spacing:2px; opacity:0; transition:opacity .3s; }
  #feedback { position:absolute; top:44%; left:50%; transform:translate(-50%,-50%); font-size:clamp(20px,3vw,36px); font-weight:700; pointer-events:none; opacity:0; text-shadow:0 0 30px currentColor; z-index:30; letter-spacing:3px; }

  /* BUTTONS (aparecem no jogo) */
  .game-btn { position:absolute; width:clamp(52px,7vw,72px); height:clamp(52px,7vw,72px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:clamp(15px,2.2vw,22px); font-weight:700; cursor:pointer; pointer-events:all; user-select:none; z-index:25; touch-action:none; transition:transform .08s; }
  .game-btn:active { transform:translate(-50%,-50%) scale(.85) !important; }
  .btn-real { background:rgba(20,55,100,.5); border:2.5px solid #4a90d9; color:#a8d4f0; box-shadow:0 0 14px rgba(74,144,217,.45); }
  .btn-real.perfect-glow { background:rgba(20,90,180,.8); border-color:#b8e0ff; box-shadow:0 0 28px rgba(180,220,255,.95),0 0 56px rgba(100,180,255,.5); color:#e0f4ff; }
  .btn-trap { background:rgba(70,10,10,.5); border:2.5px solid #b03030; color:#f0a0a0; box-shadow:0 0 14px rgba(180,48,48,.4); }
  .btn-trap.perfect-glow { background:rgba(120,20,20,.8); border-color:#ff8888; box-shadow:0 0 28px rgba(255,120,120,.75); }
  .btn-trap-alike { background:rgba(35,20,90,.5); border:2.5px solid #7a6ad9; color:#c8c0f0; box-shadow:0 0 14px rgba(122,106,217,.45); }
  .btn-trap-alike.perfect-glow { background:rgba(60,30,160,.8); border-color:#c0b8ff; box-shadow:0 0 28px rgba(192,184,255,.85); color:#e8e4ff; }
  .btn-ring { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
  #game-overlay { position:absolute; inset:0 0 clamp(72px,12vw,100px) 0; z-index:10; }

  /* MOBILE PAD — linha de teclas na base */
  #mobile-pad { position:absolute; bottom:0; left:0; right:0; height:clamp(72px,12vw,100px); display:flex; align-items:center; justify-content:center; gap:clamp(6px,1.5vw,12px); z-index:35; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); border-top:1px solid rgba(255,255,255,.07); padding:0 12px; }
  .pad-key { width:clamp(36px,5.5vw,52px); height:clamp(36px,5.5vw,52px); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:clamp(13px,1.8vw,18px); font-weight:700; letter-spacing:1px; cursor:pointer; user-select:none; touch-action:none; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.18); color:rgba(255,255,255,.55); transition:background .1s, border-color .1s, color .1s; }
  .pad-key.active-key { background:rgba(74,144,217,.35); border-color:#4a90d9; color:#a8d4f0; }
  .pad-key:active { background:rgba(255,255,255,.18) !important; }
  #pad-sep { width:1px; height:60%; background:rgba(255,255,255,.1); margin:0 4px; }

  /* ENDING */
  #screen-ending video { width:100%; height:100%; object-fit:cover; }

  /* SCORE */
  #screen-score { background:#050508; gap:18px; padding:36px 20px; overflow-y:auto; }
  #score-title { font-size:clamp(20px,4vw,46px); letter-spacing:6px; text-transform:uppercase; color:#a8d4f0; text-shadow:0 0 30px rgba(168,212,240,.5); }
  #score-result { font-size:clamp(13px,1.8vw,20px); color:rgba(255,255,255,.55); text-align:center; max-width:400px; }
  #score-final { font-size:clamp(46px,8vw,96px); font-weight:700; color:#fff; text-shadow:0 0 40px rgba(168,212,240,.7); letter-spacing:4px; }
  #score-breakdown { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
  .breakdown-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .breakdown-val { font-size:clamp(20px,3vw,34px); font-weight:700; }
  .breakdown-lbl { font-size:clamp(9px,1.1vw,12px); letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.4); }
  .val-perfect{color:#f0c040} .val-good{color:#a8d4f0} .val-miss{color:rgba(255,255,255,.3)} .val-trap{color:#e88}
  #score-verdict { font-size:clamp(15px,2.2vw,26px); letter-spacing:3px; text-transform:uppercase; }
  .verdict-win{color:#a8d4f0;text-shadow:0 0 20px rgba(168,212,240,.6)}
  .verdict-lose{color:#b03030;text-shadow:0 0 20px rgba(176,48,48,.6)}
  #leaderboard { width:100%; max-width:420px; }
  #leaderboard h3 { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.3); text-align:center; margin-bottom:10px; }
  .lb-row { display:flex; justify-content:space-between; align-items:center; padding:7px 14px; border-bottom:.5px solid rgba(255,255,255,.07); font-size:clamp(12px,1.4vw,15px); }
  .lb-row.me { background:rgba(168,212,240,.08); border-radius:4px; }
  .lb-rank{color:rgba(255,255,255,.3);width:22px} .lb-name{flex:1;padding:0 8px} .lb-score{color:#a8d4f0;font-weight:700}
  #play-again { padding:12px 40px; background:transparent; border:1px solid rgba(168,212,240,.4); color:#a8d4f0; font-family:'Georgia',serif; font-size:clamp(12px,1.4vw,15px); letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all .2s; margin-top:8px; }
  #play-again:hover { background:rgba(168,212,240,.1); border-color:#a8d4f0; }

  /* esconde pad em desktop com mouse */
  @media (hover:hover) and (pointer:fine) { #mobile-pad { opacity:.35; } }
</style>
</head>
<body>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <video id="intro-video" src="IntroFinalV2reduzido.mp4" playsinline preload="auto"></video>
  <div id="click-to-start">Toque para começar</div>
  <div id="intro-click-zone"></div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <video id="game-video" src="sequencia1.mp4" playsinline preload="auto"></video>
  <audio id="game-music" src="jogo3musica.mp3" preload="auto"></audio>
  <div id="vignette"></div>
  <div id="score-display">
    <div id="score-number">0</div>
    <div id="combo-display">COMBO x<span id="combo-val">1</span></div>
  </div>
  <div id="feedback"></div>
  <div id="game-overlay"></div>
  <!-- pad mobile: linha de teclas na base -->
  <div id="mobile-pad">
    <div class="pad-key" data-key="q">Q</div>
    <div class="pad-key" data-key="w">W</div>
    <div class="pad-key" data-key="e">E</div>
    <div class="pad-key" data-key="r">R</div>
    <div id="pad-sep"></div>
    <div class="pad-key" data-key="a">A</div>
    <div class="pad-key" data-key="s">S</div>
    <div class="pad-key" data-key="d">D</div>
    <div class="pad-key" data-key="f">F</div>
  </div>
</div>

<!-- ENDING -->
<div id="screen-ending" class="screen">
  <video id="ending-video" playsinline preload="auto"></video>
</div>

<!-- SCORE -->
<div id="screen-score" class="screen">
  <div id="score-title">A Cura Proibida</div>
  <div id="score-result"></div>
  <div id="score-final"></div>
  <div id="score-breakdown">
    <div class="breakdown-item"><div class="breakdown-val val-perfect" id="stat-perfect">0</div><div class="breakdown-lbl">Perfeitos</div></div>
    <div class="breakdown-item"><div class="breakdown-val val-good" id="stat-good">0</div><div class="breakdown-lbl">Bons</div></div>
    <div class="breakdown-item"><div class="breakdown-val val-miss" id="stat-miss">0</div><div class="breakdown-lbl">Perdidos</div></div>
    <div class="breakdown-item"><div class="breakdown-val val-trap" id="stat-trap">0</div><div class="breakdown-lbl">Armadilhas</div></div>
  </div>
  <div id="score-verdict"></div>
  <div id="leaderboard">
    <h3>Melhores Pontuações</h3>
    <div id="lb-list"></div>
  </div>
  <button id="play-again">Jogar novamente</button>
</div>

<script>
const CFG={
  WIN_SCORE:4500,
  MUSIC_VOL:1.0,
  VIDEO_VOL:0.28,
  PTS_PERFECT:150,
  PTS_GOOD:60,
  PTS_MISS:-70,
  PTS_TRAP:-160,
  PERFECT_WINDOW:200,
  KEYS:['q','w','e','r','a','s','d','f'],
  PHASES:[
    {ms:0,      spawnMs:1500, max:3, trapChance:0.12, trapAlike:false},
    {ms:55000,  spawnMs:1000, max:4, trapChance:0.28, trapAlike:false},
    {ms:88000,  spawnMs:680,  max:5, trapChance:0.40, trapAlike:true },
    {ms:125000, spawnMs:1800, max:3, trapChance:0.12, trapAlike:false}
  ],
  BTN_LIFE:[2000,1400,950,2200]
};

let score=0,combo=0,multiplier=1,stats={perfect:0,good:0,miss:0,trap:0};
let activeButtons=[],spawnTimer=null,phaseIdx=0,gameRunning=false,lastVideoIdx=-1;
const seqVideos=['sequencia1.mp4','sequencia2.mp4','sequencia3.mp4'];
const LB_KEY='aqv_lb_v2';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── INTRO ── */
const introVideo=document.getElementById('intro-video');
const introZone=document.getElementById('intro-click-zone');
introZone.addEventListener('click',()=>{
  introZone.style.pointerEvents='none';
  introVideo.play().catch(()=>{});
});
introVideo.addEventListener('ended',startGame);

/* ── GAME START ── */
function startGame(){
  score=0; combo=0; multiplier=1; stats={perfect:0,good:0,miss:0,trap:0};
  activeButtons=[]; phaseIdx=0; gameRunning=true; lastVideoIdx=-1;
  updateScoreUI(); updateComboUI();
  showScreen('screen-game');
  switchGameVideo();
  const music=document.getElementById('game-music');
  music.volume=CFG.MUSIC_VOL;
  music.currentTime=0;
  music.play();
  music.addEventListener('timeupdate',checkPhase);
  music.addEventListener('ended',onMusicEnd);
  scheduleSpawn();
}

/* ── VIDEO LOOP ── */
function switchGameVideo(){
  const gv=document.getElementById('game-video');
  let next;
  do { next=Math.floor(Math.random()*3); } while(next===lastVideoIdx);
  lastVideoIdx=next;
  gv.src=seqVideos[next];
  gv.volume=CFG.VIDEO_VOL;
  gv.loop=false;
  gv.play().catch(()=>{});
  gv.onended=switchGameVideo;
}

/* ── PHASE ── */
function checkPhase(){
  const t=document.getElementById('game-music').currentTime*1000;
  let np=0;
  for(let i=CFG.PHASES.length-1;i>=0;i--){
    if(t>=CFG.PHASES[i].ms){np=i;break;}
  }
  if(np!==phaseIdx){phaseIdx=np;clearTimeout(spawnTimer);scheduleSpawn();}
}

/* ── SPAWN ── */
function scheduleSpawn(){
  if(!gameRunning)return;
  const ph=CFG.PHASES[phaseIdx];
  spawnTimer=setTimeout(()=>{
    if(!gameRunning)return;
    activeButtons=activeButtons.filter(b=>!b.dismissed);
    if(activeButtons.length<ph.max)spawnButton();
    scheduleSpawn();
  }, ph.spawnMs+(Math.random()*300-150));
}

function spawnButton(){
  const ph=CFG.PHASES[phaseIdx];
  const isTrap=Math.random()<ph.trapChance;
  const isAlike=isTrap&&ph.trapAlike;
  const usedKeys=activeButtons.map(b=>b.key);
  const available=CFG.KEYS.filter(k=>!usedKeys.includes(k));
  if(!available.length)return;
  const key=available[Math.floor(Math.random()*available.length)];
  const x=14+Math.random()*72, y=8+Math.random()*75;
  const duration=CFG.BTN_LIFE[phaseIdx]+(Math.random()*300-150);
  const perfectStart=duration-CFG.PERFECT_WINDOW;
  const btnClass='game-btn '+(!isTrap?'btn-real':isAlike?'btn-trap-alike':'btn-trap');
  const ringColor=!isTrap?'#4a90d9':isAlike?'#7a6ad9':'#b03030';

  const el=document.createElement('div');
  el.className=btnClass;
  el.textContent=key.toUpperCase();
  el.style.cssText='left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%);';

  const ringPx=90,cx=45,cy=45,r=42;
  const circ=Math.PI*2*r;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','btn-ring');
  svg.setAttribute('width',ringPx); svg.setAttribute('height',ringPx);
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',cx); circle.setAttribute('cy',cy); circle.setAttribute('r',r);
  circle.setAttribute('fill','none'); circle.setAttribute('stroke',ringColor);
  circle.setAttribute('stroke-width','2.5');
  circle.setAttribute('stroke-dasharray',circ);
  circle.setAttribute('stroke-dashoffset',0);
  circle.setAttribute('transform','rotate(-90 '+cx+' '+cy+')');
  svg.appendChild(circle);
  el.appendChild(svg);
  document.getElementById('game-overlay').appendChild(el);

  /* highlight pad key */
  const padKey=document.querySelector('.pad-key[data-key="'+key+'"]');
  if(padKey)padKey.classList.add('active-key');

  const btn={el,key,isTrap,isPerfect:false,startTime:performance.now(),duration,perfectStart,circle,circ,dismissed:false,padKey};
  activeButtons.push(btn);
  el.addEventListener('pointerdown',e=>{e.preventDefault();handlePress(key);});
  requestAnimationFrame(()=>animateBtn(btn));
}

/* ── ANIMATE ── */
function animateBtn(btn){
  if(btn.dismissed)return;
  const elapsed=performance.now()-btn.startTime;
  const progress=Math.min(elapsed/btn.duration,1);
  btn.circle.setAttribute('stroke-dashoffset',progress*btn.circ);
  const inPerfect=elapsed>=btn.perfectStart&&elapsed<btn.duration;
  if(inPerfect!==btn.isPerfect){
    btn.isPerfect=inPerfect;
    btn.el.classList.toggle('perfect-glow',inPerfect);
  }
  if(elapsed>=btn.duration){
    btn.dismissed=true;
    removeBtn(btn);
    if(!btn.isTrap){applyScore(CFG.PTS_MISS,'PERDIDO','#555',false);stats.miss++;breakCombo();}
    return;
  }
  requestAnimationFrame(()=>animateBtn(btn));
}

function removeBtn(btn){
  btn.dismissed=true;
  if(btn.padKey)btn.padKey.classList.remove('active-key');
  btn.el.style.transition='opacity .15s';
  btn.el.style.opacity='0';
  setTimeout(()=>btn.el.parentNode&&btn.el.parentNode.removeChild(btn.el),160);
}

/* ── INPUT (keyboard) ── */
document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  const k=e.key.toLowerCase();
  if(CFG.KEYS.includes(k))handlePress(k);
});

/* ── INPUT (mobile pad) ── */
document.querySelectorAll('.pad-key').forEach(pk=>{
  pk.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(!gameRunning)return;
    handlePress(pk.dataset.key);
  });
});

function handlePress(key){
  const btn=activeButtons.find(b=>b.key===key&&!b.dismissed);
  if(!btn)return;
  btn.dismissed=true;
  removeBtn(btn);
  activeButtons=activeButtons.filter(b=>b!==btn);
  if(btn.isTrap){
    applyScore(CFG.PTS_TRAP,'ARMADILHA','#e88',false);
    stats.trap++; breakCombo(); flashVignette();
  } else if(btn.isPerfect){
    applyScore(CFG.PTS_PERFECT,'PERFEITO','#f0c040',true);
    stats.perfect++; buildCombo();
  } else {
    applyScore(CFG.PTS_GOOD,'BOM','#a8d4f0',false);
    stats.good++; buildCombo();
  }
}

/* ── SCORE / COMBO ── */
function applyScore(base,label,color,shake){
  const gained=Math.round(base*multiplier);
  score=Math.max(0,score+gained);
  updateScoreUI();
  showFeedback(label+(multiplier>1&&base>0?' x'+multiplier:''),color,shake);
}
function buildCombo(){
  combo++;
  multiplier=combo>=20?5:combo>=10?3:combo>=5?2:1;
  updateComboUI();
}
function breakCombo(){combo=0;multiplier=1;updateComboUI();}
function updateScoreUI(){document.getElementById('score-number').textContent=score;}
function updateComboUI(){
  const cd=document.getElementById('combo-display');
  cd.style.opacity=combo>=3?'1':'0';
  document.getElementById('combo-val').textContent=multiplier;
}

let fbTimer=null;
function showFeedback(text,color,shake){
  const fb=document.getElementById('feedback');
  fb.textContent=text; fb.style.color=color; fb.style.opacity='1';
  fb.style.transition='none';
  fb.style.transform='translate(-50%,-50%) scale('+(shake?'1.3':'1')+')';
  clearTimeout(fbTimer);
  fbTimer=setTimeout(()=>{
    fb.style.transition='opacity .4s,transform .4s';
    fb.style.opacity='0';
    fb.style.transform='translate(-50%,-50%) scale(.8)';
  },480);
}

let vigTimer=null;
function flashVignette(){
  const v=document.getElementById('vignette');
  v.classList.add('danger');
  clearTimeout(vigTimer);
  vigTimer=setTimeout(()=>v.classList.remove('danger'),600);
}

/* ── MUSIC END ── */
function onMusicEnd(){
  gameRunning=false;
  clearTimeout(spawnTimer);
  activeButtons.forEach(removeBtn);
  activeButtons=[];
  document.querySelectorAll('.pad-key').forEach(pk=>pk.classList.remove('active-key'));
  const music=document.getElementById('game-music');
  music.removeEventListener('timeupdate',checkPhase);
  music.removeEventListener('ended',onMusicEnd);
  showScreen('screen-ending');
  const ev=document.getElementById('ending-video');
  ev.src=score>=CFG.WIN_SCORE?'vitoriaoficial.mp4':'derrotaoficial.mp4';
  ev.play().catch(()=>{});
  ev.onended=()=>showScoreScreen(score>=CFG.WIN_SCORE);
}

/* ── SCORE SCREEN ── */
function showScoreScreen(won){
  showScreen('screen-score');
  document.getElementById('score-result').textContent=won
    ?'Kronk foi curado. A magia proibida funcionou.'
    :'A luz de Aerin não foi suficiente.';
  document.getElementById('score-final').textContent=score.toLocaleString('pt-BR');
  document.getElementById('stat-perfect').textContent=stats.perfect;
  document.getElementById('stat-good').textContent=stats.good;
  document.getElementById('stat-miss').textContent=stats.miss;
  document.getElementById('stat-trap').textContent=stats.trap;
  const verdict=document.getElementById('score-verdict');
  verdict.textContent=won?'— Kronk sobrevive —':'— A cura falhou —';
  verdict.className='score-verdict '+(won?'verdict-win':'verdict-lose');

  const playerName=getPlayerName();
  let lb=getLB();
  lb.push({name:playerName,score,won});
  lb.sort((a,b)=>b.score-a.score);
  lb=lb.slice(0,10);
  saveLB(lb);
  const myEntry=lb.find(e=>e.name===playerName&&e.score===score);
  const lbList=document.getElementById('lb-list');
  lbList.innerHTML='';
  lb.forEach((e,i)=>{
    const row=document.createElement('div');
    row.className='lb-row'+(e===myEntry?' me':'');
    row.innerHTML='<span class="lb-rank">'+(i+1)+'</span><span class="lb-name">'+esc(e.name)+'</span><span class="lb-score">'+e.score.toLocaleString('pt-BR')+'</span>';
    lbList.appendChild(row);
  });
}

function getPlayerName(){
  let n=localStorage.getItem('aqv_player');
  if(!n){n=(prompt('Seu nome para o placar:')||'Anonimo').slice(0,20);localStorage.setItem('aqv_player',n);}
  return n;
}
function getLB(){try{return JSON.parse(localStorage.getItem(LB_KEY))||[];}catch{return[];}}
function saveLB(d){localStorage.setItem(LB_KEY,JSON.stringify(d));}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('play-again').addEventListener('click',()=>{
  showScreen('screen-intro');
  introVideo.currentTime=0;
  introZone.style.pointerEvents='all';
});

/* preload ending videos */
window.addEventListener('load',()=>{
  ['vitoriaoficial.mp4','derrotaoficial.mp4'].forEach(src=>{
    const v=document.createElement('video');
    v.src=src; v.preload='auto'; v.style.display='none';
    document.body.appendChild(v);
  });
});
</script>
</body>
</html>
